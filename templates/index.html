<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph Service UI</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        html,
        body {
            height: 100%;
        }
        
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        
        #map {
            position: fixed;
            inset: 0;
        }
        
        .floating-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .25);
        }
        
        .sidebar {
            position: fixed;
            top: 80px;
            left: 16px;
            z-index: 1200;
            width: 320px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
            padding: 16px;
        }
        
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            display: none;
            z-index: 1100;
        }
        
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border-radius: 12px;
            width: min(92vw, 720px);
            padding: 16px;
            display: none;
            z-index: 1200;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
        }
        
        .row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        label {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        input,
        select {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        
        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        
        .btn-secondary {
            background: #6b7280;
        }
        
        pre {
            background: #0b1021;
            color: #d1d5db;
            padding: 12px;
            border-radius: 8px;
            max-height: 220px;
            overflow: auto;
        }
        
    </style>
</head>

<body>
    <div id="map"></div>
    
    <div class="sidebar">
        <h2 style="margin:0 0 12px">Параметры графа</h2>
        <div style="display:flex; flex-direction:column; gap:12px">
            <label style="display:flex; flex-direction:column; gap:4px">
                Город
                <input 
                    id="cityInput" 
                    list="cityList"
                    placeholder="Начните вводить название..." 
                    style="width:100%"
                    autocomplete="off"
                />
                <datalist id="cityList"></datalist>
            </label>
            
            <label style="display:flex; flex-direction:column; gap:4px">
                Тип графа
                <select id="graphType" style="width:100%">
                    <option value="road">Дороги (OSM)</option>
                    <option value="delaunay">Delaunay триангуляция</option>
                </select>
            </label>
        </div>
        
        <div class="modal-footer">
            <div style="font-size:14px">
                <div id="status"></div>
                <div id="statsInfo" style="margin-top:4px; color:#6b7280; font-size:12px"></div>
            </div>
            <div>
                <button class="floating-btn" style="position:static" onclick="buildGraph()">Построить</button>
            </div>
        </div>
    </div>

    <script>
        let map, edgesLayer, boundaryLayer, noFlyZonesLayer, buildingsLayer;
        
        // Список популярных городов
        const CITIES = [
            { name: 'Москва', query: 'Moscow, Russia' },
            { name: 'Санкт-Петербург', query: 'Saint Petersburg, Russia' },
            { name: 'Новосибирск', query: 'Novosibirsk, Russia' },
            { name: 'Екатеринбург', query: 'Yekaterinburg, Russia' },
            { name: 'Казань', query: 'Kazan, Russia' },
            { name: 'Нижний Новгород', query: 'Nizhny Novgorod, Russia' },
            { name: 'Челябинск', query: 'Chelyabinsk, Russia' },
            { name: 'Самара', query: 'Samara, Russia' },
            { name: 'Омск', query: 'Omsk, Russia' },
            { name: 'Ростов-на-Дону', query: 'Rostov-on-Don, Russia' },
            { name: 'Уфа', query: 'Ufa, Russia' },
            { name: 'Красноярск', query: 'Krasnoyarsk, Russia' },
            { name: 'Воронеж', query: 'Voronezh, Russia' },
            { name: 'Пермь', query: 'Perm, Russia' },
            { name: 'Волгоград', query: 'Volgograd, Russia' },
            { name: 'Краснодар', query: 'Krasnodar, Russia' },
            { name: 'Саратов', query: 'Saratov, Russia' },
            { name: 'Тюмень', query: 'Tyumen, Russia' },
            { name: 'Тольятти', query: 'Tolyatti, Russia' },
            { name: 'Ижевск', query: 'Izhevsk, Russia' },
            { name: 'Барнаул', query: 'Barnaul, Russia' },
            { name: 'Ульяновск', query: 'Ulyanovsk, Russia' },
            { name: 'Иркутск', query: 'Irkutsk, Russia' },
            { name: 'Хабаровск', query: 'Khabarovsk, Russia' },
            { name: 'Владивосток', query: 'Vladivostok, Russia' },
            { name: 'Ярославль', query: 'Yaroslavl, Russia' },
            { name: 'Махачкала', query: 'Makhachkala, Russia' },
            { name: 'Томск', query: 'Tomsk, Russia' },
            { name: 'Оренбург', query: 'Orenburg, Russia' },
            { name: 'Кемерово', query: 'Kemerovo, Russia' },
        ];

        function ensureMap(center = [55.751244, 37.618423]) {
            if (!map) {
                map = L.map('map').setView(center, 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);
            }
        }
        
        function initCityAutocomplete() {
            const datalist = document.getElementById('cityList');
            const input = document.getElementById('cityInput');
            
            // Заполняем datalist городами
            CITIES.forEach(city => {
                const option = document.createElement('option');
                option.value = city.name;
                option.setAttribute('data-query', city.query);
                datalist.appendChild(option);
            });
            
            // Обработка выбора города
            input.addEventListener('input', function() {
                const selectedCity = CITIES.find(c => c.name === this.value);
                if (selectedCity) {
                    this.setAttribute('data-query', selectedCity.query);
                }
            });
        }
        
        function getCityQuery() {
            const input = document.getElementById('cityInput');
            const value = input.value.trim();
            
            if (!value) return null;
            
            // Проверяем, выбран ли город из списка
            const selectedCity = CITIES.find(c => c.name === value);
            if (selectedCity) {
                return selectedCity.query;
            }
            
            // Иначе используем введенное значение как есть
            return value;
        }

        function getEdgeColor(edgeType) {
            switch(edgeType) {
                case 'road': return '#2563eb';      // синий для дорог
                case 'free': return '#10b981';      // зеленый для свободного пространства
                case 'connection': return '#f59e0b'; // оранжевый для соединений
                default: return '#6b7280';          // серый по умолчанию
            }
        }

        function getEdgeWeight(edgeType) {
            switch(edgeType) {
                case 'road': return 2.5;
                case 'free': return 1.5;
                case 'connection': return 2;
                default: return 2;
            }
        }

        function getBuildingColor(buildingType) {
            const colors = {
                'apartment': '#ef4444',    // красный - многоквартирные
                'house': '#10b981',        // зеленый - частные дома
                'industrial': '#f59e0b',   // оранжевый - промышленные
                'commercial': '#3b82f6',   // синий - коммерческие
                'office': '#8b5cf6',       // фиолетовый - офисные
                'public': '#ec4899',       // розовый - общественные
                'other': '#6b7280'         // серый - прочие
            };
            return colors[buildingType] || colors['other'];
        }

        async function loadBuildingClusters(city, network, simplify) {
            try {
                console.log('Загрузка кластеров зданий...');
                const clustersUrl = new URL('/api/buildings/clusters', window.location.origin);
                clustersUrl.searchParams.set('city', city);
                clustersUrl.searchParams.set('network_type', network);
                clustersUrl.searchParams.set('simplify', simplify);
                
                // Загружаем без таймаута, чтобы все здания успели загрузиться
                console.log('Отправка запроса:', clustersUrl.toString());
                const clustersResp = await fetch(clustersUrl);
                
                if (!clustersResp.ok) {
                    const errorText = await clustersResp.text();
                    console.error('Ошибка HTTP:', clustersResp.status, errorText);
                    throw new Error(`Ошибка загрузки зданий: ${clustersResp.status} ${errorText}`);
                }
                
                console.log('Получен ответ, парсинг JSON...');
                const clustersData = await clustersResp.json();
                console.log('Данные распарсены, проверка структуры...');
                
                if (!clustersData) {
                    console.error('Данные пусты');
                    throw new Error('Данные зданий пусты');
                }
                
                if (!clustersData.clusters || Object.keys(clustersData.clusters).length === 0) {
                    console.log('Кластеры зданий не найдены или пусты');
                    if (clustersData.message) {
                        console.log('Сообщение:', clustersData.message);
                    }
                    return;
                }
                
                console.log('Статистика зданий:', clustersData.statistics);
                console.log(`Всего зданий: ${clustersData.total}`);
                console.log(`Типов зданий: ${Object.keys(clustersData.clusters).length}`);
                
                // Создаем слой для каждого типа зданий
                const buildingLayers = [];
                
                for (const [buildingType, geojson] of Object.entries(clustersData.clusters)) {
                    try {
                        if (!geojson) {
                            console.warn(`Тип ${buildingType}: geojson пуст`);
                            continue;
                        }
                        
                        if (!geojson.features || geojson.features.length === 0) {
                            console.log(`Пропущен тип ${buildingType}: нет features`);
                            continue;
                        }
                        
                        console.log(`Обработка типа ${buildingType}: ${geojson.features.length} точек`);
                        
                        // Отрисовываем точки (маркеры) вместо полигонов
                        const color = getBuildingColor(buildingType);
                        
                        const layerOptions = {
                            pointToLayer: function(feature, latlng) {
                                // Создаем круглый маркер для каждой точки
                                return L.circleMarker(latlng, {
                                    radius: 4,  // Размер точки
                                    fillColor: color,
                                    color: color,
                                    weight: 1,
                                    opacity: 0.8,
                                    fillOpacity: 0.6
                                });
                            },
                            onEachFeature: function(feature, layer) {
                                layer.bindPopup(`
                                    <strong>Тип здания:</strong> ${getBuildingTypeName(buildingType)}<br>
                                    <strong>Категория:</strong> ${buildingType}
                                `);
                            }
                        };
                        
                        console.log(`Создание GeoJSON слоя для ${buildingType} (точки)...`);
                        const layer = L.geoJSON(geojson, layerOptions);
                        buildingLayers.push(layer);
                        console.log(`✓ Добавлен слой для ${buildingType}: ${geojson.features.length} зданий`);
                    } catch (typeError) {
                        console.error(`Ошибка при обработке типа ${buildingType}:`, typeError);
                        console.error('Stack:', typeError.stack);
                        // Продолжаем обработку других типов
                    }
                }
                
                // Группируем все слои зданий
                if (buildingLayers.length > 0) {
                    console.log(`Создание layerGroup из ${buildingLayers.length} слоев...`);
                    buildingsLayer = L.layerGroup(buildingLayers);
                    console.log('Добавление buildingsLayer на карту...');
                    buildingsLayer.addTo(map);
                    console.log(`✓ Загружено ${buildingLayers.length} типов зданий, всего: ${clustersData.total}`);
                } else {
                    console.warn('Не создано ни одного слоя зданий');
                }
            } catch (error) {
                console.error('КРИТИЧЕСКАЯ ОШИБКА загрузки кластеров зданий:', error);
                console.error('Тип ошибки:', error.constructor.name);
                console.error('Сообщение:', error.message);
                console.error('Stack:', error.stack);
                throw error;  // Пробрасываем ошибку, чтобы её можно было обработать выше
            }
        }

        function getBuildingTypeName(buildingType) {
            const names = {
                'apartment': 'Многоквартирный дом',
                'house': 'Частный дом',
                'industrial': 'Промышленное здание',
                'commercial': 'Коммерческое здание',
                'office': 'Офисное здание',
                'public': 'Общественное здание',
                'other': 'Прочее'
            };
            return names[buildingType] || buildingType;
        }

        async function buildGraph() {
            const city = getCityQuery();
            const graphType = document.getElementById('graphType').value;
            
            // Фиксированные параметры (оптимальные)
            const network = 'all';           // всегда все типы дорог
            const simplify = true;           // всегда упрощаем
            
            const statusEl = document.getElementById('status');
            const statsEl = document.getElementById('statsInfo');
            
            if (!city) {
                alert('Выберите или введите город');
                return;
            }
            
            statusEl.textContent = 'Загрузка данных города...';
            statsEl.textContent = '';
            
            try {
                // Сначала загружаем данные города
                const cityUrl = new URL('/api/city', window.location.origin);
                cityUrl.searchParams.set('city', city);
                cityUrl.searchParams.set('network_type', network);
                cityUrl.searchParams.set('simplify', simplify);
                const cityResp = await fetch(cityUrl);
                const cityData = await cityResp.json();
                if (!cityResp.ok) throw new Error(cityData.detail || 'Ошибка загрузки данных');

                statusEl.textContent = 'Генерация графа...';

                // Затем загружаем граф нужного типа
                const graphUrl = new URL('/api/graph', window.location.origin);
                graphUrl.searchParams.set('city', city);
                graphUrl.searchParams.set('network_type', network);
                graphUrl.searchParams.set('simplify', simplify);
                graphUrl.searchParams.set('graph_type', graphType);
                
                const graphResp = await fetch(graphUrl);
                if (!graphResp.ok) {
                    const errorData = await graphResp.json().catch(() => ({ detail: 'Неизвестная ошибка' }));
                    throw new Error(errorData.detail || 'Ошибка генерации графа');
                }
                
                const graphData = await graphResp.json();

                statusEl.textContent = 'Отрисовка...';

                ensureMap([graphData.center.lat, graphData.center.lon]);
                
                // Удаляем старые слои
                if (edgesLayer) {
                    map.removeLayer(edgesLayer);
                }
                if (boundaryLayer) {
                    map.removeLayer(boundaryLayer);
                }
                if (noFlyZonesLayer) {
                    map.removeLayer(noFlyZonesLayer);
                }
                if (buildingsLayer) {
                    map.removeLayer(buildingsLayer);
                }

                // Добавляем беспилотные зоны (если есть) - ПЕРВЫМИ, чтобы они были под графом
                if (graphData.no_fly_zones) {
                    noFlyZonesLayer = L.geoJSON(graphData.no_fly_zones, {
                        style: {
                            color: '#dc2626',  // Красный цвет границы
                            weight: 2,
                            opacity: 0.9,
                            fillColor: '#dc2626',  // Красная заливка
                            fillOpacity: 0.3,  // Полупрозрачная заливка
                            dashArray: '5, 5'  // Пунктирная линия
                        },
                        onEachFeature: function(feature, layer) {
                            layer.bindPopup('🚫 Беспилотная зона<br>Полет запрещен');
                        }
                    }).addTo(map);
                }

                // Добавляем границы города (если есть)
                if (graphData.city_boundary) {
                    boundaryLayer = L.geoJSON(graphData.city_boundary, {
                        style: {
                            color: '#ef4444',
                            weight: 3,
                            opacity: 0.8,
                            fillColor: '#fee2e2',
                            fillOpacity: 0.1,
                            dashArray: '10, 5'
                        }
                    }).addTo(map);
                }

                // Загружаем и отображаем кластеризованные здания (ожидаем завершения)
                try {
                    console.log('Начало загрузки зданий...');
                    await loadBuildingClusters(city, network, simplify);
                    console.log('✓ Здания успешно загружены и отображены');
                } catch (err) {
                    console.error('ОШИБКА загрузки зданий:', err);
                    console.error('Детали ошибки:', {
                        name: err.name,
                        message: err.message,
                        stack: err.stack
                    });
                    statusEl.textContent = '✓ Готово (ошибка загрузки зданий: ' + err.message + ')';
                }
                
                // Отрисовываем ВСЕ рёбра графа
                const totalEdges = graphData.edges?.features?.length || 0;
                console.log(`Отрисовка графа: ${totalEdges} рёбер`);
                
                try {
                    // Используем canvas renderer для лучшей производительности при большом количестве рёбер
                    const edgeLayerOptions = {
                        style: function(feature) {
                            const edgeType = feature.properties?.edge_type || 'unknown';
                            return {
                                color: getEdgeColor(edgeType),
                                weight: getEdgeWeight(edgeType),
                                opacity: 0.7
                            };
                        },
                        onEachFeature: function(feature, layer) {
                            if (feature.properties) {
                                const props = feature.properties;
                                layer.bindPopup(`
                                    Тип: ${props.edge_type || 'unknown'}<br>
                                    Длина: ${(props.length || 0).toFixed(4)} км
                                `);
                            }
                        }
                    };
                    
                    // Пробуем использовать canvas renderer, если поддерживается
                    try {
                        if (L.Canvas && L.canvas) {
                            edgeLayerOptions.renderer = L.canvas({ padding: 0.5 });
                            console.log('Используется Canvas renderer для рёбер');
                        }
                    } catch (rendererError) {
                        console.warn('Canvas renderer недоступен для рёбер, используется SVG:', rendererError);
                    }
                    
                    // Добавляем новый слой с учетом типов рёбер
                    console.log('Создание слоя рёбер графа...');
                    edgesLayer = L.geoJSON(graphData.edges, edgeLayerOptions);
                    console.log('Добавление слоя рёбер на карту...');
                    edgesLayer.addTo(map);
                    console.log('✓ Слой рёбер успешно добавлен');
                } catch (edgeError) {
                    console.error('ОШИБКА при создании слоя рёбер:', edgeError);
                    console.error('Детали:', edgeError.message, edgeError.stack);
                    throw edgeError;
                }
                
                // Подгоняем карту под границы
                const [minLon, minLat, maxLon, maxLat] = graphData.bbox;
                const bounds = L.latLngBounds([
                    [minLat, minLon],
                    [maxLat, maxLon]
                ]);
                map.fitBounds(bounds, { padding: [20, 20] });
                
                // Обновляем статус и статистику
                statusEl.textContent = '✓ Готово';
                
                const stats = graphData.stats || {};
                let statsText = `Узлов: ${stats.nodes || 0}, Рёбер: ${stats.edges || 0}`;
                if (stats.road_nodes) {
                    statsText += `\nДороги: ${stats.road_nodes}, Свободные: ${stats.free_nodes}`;
                }
                statsEl.textContent = statsText;
                
            } catch (e) {
                console.error(e);
                statusEl.textContent = '✗ Ошибка: ' + e.message;
                statsEl.textContent = '';
            }
        }

        // Инициализация
        ensureMap();
        initCityAutocomplete();
    </script>
</body>

</html>
