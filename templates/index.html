<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph Service UI</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        html,
        body {
            height: 100%;
        }
        
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        
        #map {
            position: fixed;
            inset: 0;
        }
        
        .floating-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .25);
        }
        
        .sidebar {
            position: fixed;
            top: 80px;
            left: 16px;
            z-index: 1200;
            width: 320px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
            padding: 16px;
        }
        
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            display: none;
            z-index: 1100;
        }
        
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border-radius: 12px;
            width: min(92vw, 720px);
            padding: 16px;
            display: none;
            z-index: 1200;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
        }
        
        .row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        label {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        input,
        select {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        
        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        
        .flight-levels-panel {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }
        .flight-levels-panel h3 {
            margin: 0 0 8px;
            font-size: 14px;
            color: #374151;
        }
        .flight-level-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 13px;
            color: #4b5563;
        }
        .flight-level-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .height-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
            color: #6b7280;
        }
        .height-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .height-legend .swatch {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
        
        .btn-secondary {
            background: #6b7280;
        }
        
        pre {
            background: #0b1021;
            color: #d1d5db;
            padding: 12px;
            border-radius: 8px;
            max-height: 220px;
            overflow: auto;
        }
        
    </style>
</head>

<body>
    <div id="map"></div>
    
    <div class="sidebar">
        <h2 style="margin:0 0 12px">Параметры графа</h2>
        <div style="display:flex; flex-direction:column; gap:12px">
            <label style="display:flex; flex-direction:column; gap:4px">
                Город
                <input 
                    id="cityInput" 
                    list="cityList"
                    placeholder="Начните вводить название..." 
                    style="width:100%"
                    autocomplete="off"
                />
                <datalist id="cityList"></datalist>
            </label>
            
            <label style="display:flex; flex-direction:column; gap:4px">
                Тип графа
                <select id="graphType" style="width:100%">
                    <option value="road">Дороги (OSM)</option>
                    <option value="delaunay">Delaunay триангуляция</option>
                </select>
            </label>
            
            <label id="flightLevelFilterLabel" style="display:none; flex-direction:column; gap:4px">
                Эшелон (маршруты)
                <select id="flightLevelFilter" style="width:100%" onchange="applyFlightLevelFilter()">
                    <option value="">Все</option>
                    <option value="1">Эшелон 1</option>
                    <option value="2">Эшелон 2</option>
                    <option value="3">Эшелон 3</option>
                    <option value="4">Эшелон 4</option>
                </select>
            </label>
        </div>
        
        <div class="modal-footer">
            <div style="font-size:14px">
                <div id="status"></div>
                <div id="statsInfo" style="margin-top:4px; color:#6b7280; font-size:12px"></div>
            </div>
            <div>
                <button class="floating-btn" style="position:static" onclick="buildGraph()">Построить</button>
            </div>
        </div>
        
        <div id="flightLevelsPanel" class="flight-levels-panel" style="display:none">
            <h3>Эшелоны полётов</h3>
            <div id="flightLevelsList"></div>
            <div class="height-legend">
                <span><span class="swatch" style="background:#22c55e"></span> &lt;15 м</span>
                <span><span class="swatch" style="background:#eab308"></span> 15–30 м</span>
                <span><span class="swatch" style="background:#f97316"></span> 30–50 м</span>
                <span><span class="swatch" style="background:#ef4444"></span> &gt;50 м</span>
            </div>
        </div>
    </div>

    <script>
        let map, edgesLayer, boundaryLayer, noFlyZonesLayer, buildingsLayer;
        let lastGraphData = null;
        let lastGraphType = null;
        
        // Список популярных городов
        const CITIES = [
            { name: 'Волгоград', query: 'Volgograd, Russia' },
            { name: 'Балаково', query: 'Balakovo, Russia' },
        ];

        function ensureMap(center = [55.751244, 37.618423]) {
            if (!map) {
                map = L.map('map').setView(center, 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);
            }
        }
        
        function initCityAutocomplete() {
            const datalist = document.getElementById('cityList');
            const input = document.getElementById('cityInput');
            
            // Заполняем datalist городами
            CITIES.forEach(city => {
                const option = document.createElement('option');
                option.value = city.name;
                option.setAttribute('data-query', city.query);
                datalist.appendChild(option);
            });
            
            // Обработка выбора города
            input.addEventListener('input', function() {
                const selectedCity = CITIES.find(c => c.name === this.value);
                if (selectedCity) {
                    this.setAttribute('data-query', selectedCity.query);
                }
            });
        }
        
        function getCityQuery() {
            const input = document.getElementById('cityInput');
            const value = input.value.trim();
            
            if (!value) return null;
            
            // Проверяем, выбран ли город из списка
            const selectedCity = CITIES.find(c => c.name === value);
            if (selectedCity) {
                return selectedCity.query;
            }
            
            // Иначе используем введенное значение как есть
            return value;
        }

        function getEdgeColor(edgeType) {
            switch(edgeType) {
                case 'road': return '#2563eb';      // синий для дорог
                case 'free': return '#10b981';      // зеленый для свободного пространства
                case 'connection': return '#f59e0b'; // оранжевый для соединений
                default: return '#6b7280';          // серый по умолчанию
            }
        }

        function getEdgeWeight(edgeType) {
            switch(edgeType) {
                case 'road': return 2.5;
                case 'free': return 1.5;
                case 'connection': return 2;
                default: return 2;
            }
        }

        function getBuildingColor(buildingType) {
            const colors = {
                'apartment': '#ef4444',    // красный - многоквартирные
                'house': '#10b981',        // зеленый - частные дома
                'industrial': '#f59e0b',   // оранжевый - промышленные
                'commercial': '#3b82f6',   // синий - коммерческие
                'office': '#8b5cf6',       // фиолетовый - офисные
                'public': '#ec4899',       // розовый - общественные
                'other': '#6b7280'         // серый - прочие
            };
            return colors[buildingType] || colors['other'];
        }

        /** Цвет здания по высоте: низкие — зелёный, высокие — красный */
        function getBuildingColorByHeight(heightM) {
            const h = parseFloat(heightM) || 10;
            if (h < 15) return '#22c55e';   // зелёный
            if (h < 30) return '#eab308';   // жёлтый
            if (h < 50) return '#f97316';   // оранжевый
            return '#ef4444';               // красный
        }

        /** Цвет точки эшелона на легенде */
        function getFlightLevelColor(level) {
            const colors = ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444'];
            return colors[(level - 1) % colors.length] || '#6b7280';
        }

        function getFilteredEdges(graphData, flightLevelFilter) {
            const features = graphData?.edges?.features || [];
            if (!flightLevelFilter || graphData?.graph_type !== 'delaunay') return features;
            const level = parseInt(flightLevelFilter, 10);
            if (isNaN(level)) return features;
            return features.filter(f => {
                const allowed = f.properties?.allowed_flight_levels;
                return Array.isArray(allowed) && allowed.includes(level);
            });
        }

        function applyFlightLevelFilter() {
            if (!lastGraphData || !map || !edgesLayer) return;
            const sel = document.getElementById('flightLevelFilter');
            const filter = sel ? sel.value : '';
            const features = getFilteredEdges(lastGraphData, filter);
            map.removeLayer(edgesLayer);
            edgesLayer = createEdgesLayer(lastGraphData, features);
            edgesLayer.addTo(map);
            const statsEl = document.getElementById('statsInfo');
            if (statsEl && lastGraphData.graph_type === 'delaunay') {
                const total = lastGraphData.edges?.features?.length || 0;
                const shown = features.length;
                const base = `Узлов: ${lastGraphData.stats?.nodes || 0}, Рёбер: ${lastGraphData.stats?.edges || 0}`;
                statsEl.textContent = filter ? `${base} (показано: ${shown} для эшелона ${filter})` : base;
            }
        }

        function createEdgesLayer(graphData, features) {
            const geojson = { type: 'FeatureCollection', features };
            return L.geoJSON(geojson, {
                style: function(feature) {
                    const edgeType = feature.properties?.edge_type || 'unknown';
                    return {
                        color: getEdgeColor(edgeType),
                        weight: getEdgeWeight(edgeType),
                        opacity: 0.7
                    };
                },
                onEachFeature: function(feature, layer) {
                    if (feature.properties) {
                        const p = feature.properties;
                        const allowed = p.allowed_flight_levels;
                        const allowedStr = Array.isArray(allowed) ? allowed.join(', ') : '—';
                        layer.bindPopup(`
                            Тип: ${p.edge_type || 'unknown'}<br>
                            Длина: ${(p.length || 0).toFixed(4)} км<br>
                            Эшелоны: ${allowedStr}
                        `);
                    }
                }
            });
        }

        function updateFlightLevelsPanel(flightLevels) {
            const panel = document.getElementById('flightLevelsPanel');
            const list = document.getElementById('flightLevelsList');
            if (!flightLevels || flightLevels.length === 0) {
                panel.style.display = 'none';
                return;
            }
            list.innerHTML = flightLevels.map(fl => `
                <div class="flight-level-item">
                    <span class="flight-level-dot" style="background:${getFlightLevelColor(fl.level)}"></span>
                    <span>${fl.label || 'Эшелон ' + fl.level + ' (' + fl.altitude_m + ' м)'}</span>
                </div>
            `).join('');
            panel.style.display = 'block';
        }

        async function loadBuildingsWithHeights(city, network, simplify) {
            try {
                console.log('Загрузка зданий с высотами...');
                const exportUrl = new URL('/api/buildings/export', window.location.origin);
                exportUrl.searchParams.set('city', city);
                exportUrl.searchParams.set('network_type', network);
                exportUrl.searchParams.set('simplify', simplify);
                
                const resp = await fetch(exportUrl);
                if (!resp.ok) throw new Error('Ошибка загрузки зданий: ' + resp.status);
                
                const data = await resp.json();
                if (!data.features || data.features.length === 0) {
                    console.log('Нет зданий для отображения');
                    return;
                }
                
                updateFlightLevelsPanel(data.flight_levels || []);
                
                const geojson = { type: 'FeatureCollection', features: data.features };
                const layerOptions = {
                    style: function(feature) {
                        const h = feature.properties?.height_m || 10;
                        const color = getBuildingColorByHeight(h);
                        return {
                            fillColor: color,
                            color: color,
                            weight: 1,
                            opacity: 0.85,
                            fillOpacity: 0.5
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        const p = feature.properties || {};
                        const h = p.height_m || '—';
                        const fl = p.flight_level || '—';
                        layer.bindPopup(`
                            <strong>Высота:</strong> ${h} м<br>
                            <strong>Рекомендуемый эшелон:</strong> ${fl}
                        `);
                    }
                };
                
                buildingsLayer = L.geoJSON(geojson, layerOptions);
                buildingsLayer.addTo(map);
                console.log('✓ Здания по высоте: ' + data.features.length);
            } catch (error) {
                console.error('Ошибка загрузки зданий с высотами:', error);
                throw error;
            }
        }

        function getBuildingTypeName(buildingType) {
            const names = {
                'apartment': 'Многоквартирный дом',
                'house': 'Частный дом',
                'industrial': 'Промышленное здание',
                'commercial': 'Коммерческое здание',
                'office': 'Офисное здание',
                'public': 'Общественное здание',
                'other': 'Прочее'
            };
            return names[buildingType] || buildingType;
        }

        async function buildGraph() {
            const city = getCityQuery();
            const graphType = document.getElementById('graphType').value;
            
            // Фиксированные параметры (оптимальные)
            const network = 'all';           // всегда все типы дорог
            const simplify = true;           // всегда упрощаем
            
            const statusEl = document.getElementById('status');
            const statsEl = document.getElementById('statsInfo');
            
            if (!city) {
                alert('Выберите или введите город');
                return;
            }
            
            statusEl.textContent = 'Загрузка данных города...';
            statsEl.textContent = '';
            
            try {
                // Сначала загружаем данные города
                const cityUrl = new URL('/api/city', window.location.origin);
                cityUrl.searchParams.set('city', city);
                cityUrl.searchParams.set('network_type', network);
                cityUrl.searchParams.set('simplify', simplify);
                const cityResp = await fetch(cityUrl);
                const cityData = await cityResp.json();
                if (!cityResp.ok) throw new Error(cityData.detail || 'Ошибка загрузки данных');

                statusEl.textContent = 'Генерация графа...';

                // Затем загружаем граф нужного типа
                const graphUrl = new URL('/api/graph', window.location.origin);
                graphUrl.searchParams.set('city', city);
                graphUrl.searchParams.set('network_type', network);
                graphUrl.searchParams.set('simplify', simplify);
                graphUrl.searchParams.set('graph_type', graphType);
                
                const graphResp = await fetch(graphUrl);
                if (!graphResp.ok) {
                    const errorData = await graphResp.json().catch(() => ({ detail: 'Неизвестная ошибка' }));
                    throw new Error(errorData.detail || 'Ошибка генерации графа');
                }
                
                const graphData = await graphResp.json();

                statusEl.textContent = 'Отрисовка...';
                lastGraphData = graphData;
                lastGraphType = graphType;
                updateFlightLevelsPanel(graphData.flight_levels || []);

                const flLabel = document.getElementById('flightLevelFilterLabel');
                const flSel = document.getElementById('flightLevelFilter');
                if (graphType === 'delaunay' && graphData.flight_levels?.length) {
                    if (flLabel) flLabel.style.display = 'flex';
                    if (flSel) {
                        flSel.innerHTML = '<option value="">Все</option>' + graphData.flight_levels.map(fl =>
                            `<option value="${fl.level}">${fl.label || 'Эшелон ' + fl.level}</option>`
                        ).join('');
                        flSel.value = '';
                    }
                } else {
                    if (flLabel) flLabel.style.display = 'none';
                }

                ensureMap([graphData.center.lat, graphData.center.lon]);
                
                // Удаляем старые слои
                if (edgesLayer) {
                    map.removeLayer(edgesLayer);
                }
                if (boundaryLayer) {
                    map.removeLayer(boundaryLayer);
                }
                if (noFlyZonesLayer) {
                    map.removeLayer(noFlyZonesLayer);
                }
                if (buildingsLayer) {
                    map.removeLayer(buildingsLayer);
                }

                // Добавляем беспилотные зоны (если есть) - ПЕРВЫМИ, чтобы они были под графом
                if (graphData.no_fly_zones) {
                    noFlyZonesLayer = L.geoJSON(graphData.no_fly_zones, {
                        style: {
                            color: '#dc2626',  // Красный цвет границы
                            weight: 2,
                            opacity: 0.9,
                            fillColor: '#dc2626',  // Красная заливка
                            fillOpacity: 0.3,  // Полупрозрачная заливка
                            dashArray: '5, 5'  // Пунктирная линия
                        },
                        onEachFeature: function(feature, layer) {
                            layer.bindPopup('🚫 Беспилотная зона<br>Полет запрещен');
                        }
                    }).addTo(map);
                }

                // Добавляем границы города (если есть)
                if (graphData.city_boundary) {
                    boundaryLayer = L.geoJSON(graphData.city_boundary, {
                        style: {
                            color: '#ef4444',
                            weight: 3,
                            opacity: 0.8,
                            fillColor: '#fee2e2',
                            fillOpacity: 0.1,
                            dashArray: '10, 5'
                        }
                    }).addTo(map);
                }

                // Загружаем здания с высотами (полигоны, окраска по высоте)
                try {
                    console.log('Начало загрузки зданий с высотами...');
                    await loadBuildingsWithHeights(city, network, simplify);
                    console.log('✓ Здания по высоте загружены');
                } catch (err) {
                    console.error('ОШИБКА загрузки зданий:', err);
                    console.error('Детали ошибки:', {
                        name: err.name,
                        message: err.message,
                        stack: err.stack
                    });
                    statusEl.textContent = '✓ Готово (ошибка загрузки зданий: ' + err.message + ')';
                }
                
                const flightFilter = document.getElementById('flightLevelFilter')?.value || '';
                const featuresToShow = getFilteredEdges(graphData, flightFilter);
                console.log(`Отрисовка графа: ${featuresToShow.length} рёбер (всего ${graphData.edges?.features?.length || 0})`);
                try {
                    edgesLayer = createEdgesLayer(graphData, featuresToShow);
                    edgesLayer.addTo(map);
                } catch (edgeError) {
                    console.error('ОШИБКА при создании слоя рёбер:', edgeError);
                    throw edgeError;
                }
                
                // Подгоняем карту под границы
                const [minLon, minLat, maxLon, maxLat] = graphData.bbox;
                const bounds = L.latLngBounds([
                    [minLat, minLon],
                    [maxLat, maxLon]
                ]);
                map.fitBounds(bounds, { padding: [20, 20] });
                
                statusEl.textContent = '✓ Готово';
                const stats = graphData.stats || {};
                let statsText = `Узлов: ${stats.nodes || 0}, Рёбер: ${stats.edges || 0}`;
                if (graphType === 'delaunay' && flightFilter && graphData.edges?.features) {
                    statsText += ` (показано: ${featuresToShow.length} для эшелона ${flightFilter})`;
                }
                if (stats.road_nodes) {
                    statsText += `\nДороги: ${stats.road_nodes}, Свободные: ${stats.free_nodes}`;
                }
                statsEl.textContent = statsText;
                
            } catch (e) {
                console.error(e);
                statusEl.textContent = '✗ Ошибка: ' + e.message;
                statsEl.textContent = '';
            }
        }

        // Инициализация
        ensureMap();
        initCityAutocomplete();
    </script>
</body>

</html>
