<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Карта города — границы и здания</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        html,
        body {
            height: 100%;
        }
        
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        
        #map {
            position: fixed;
            inset: 0;
        }
        
        .floating-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .25);
        }
        
        .sidebar {
            position: fixed;
            top: 80px;
            left: 16px;
            z-index: 1200;
            width: 320px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
            padding: 16px;
        }
        
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            display: none;
            z-index: 1100;
        }
        
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border-radius: 12px;
            width: min(92vw, 720px);
            padding: 16px;
            display: none;
            z-index: 1200;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
        }
        
        .row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        label {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        input,
        select {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        
        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        
        .flight-levels-panel {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }
        .flight-levels-panel h3 {
            margin: 0 0 8px;
            font-size: 14px;
            color: #374151;
        }
        .flight-level-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 13px;
            color: #4b5563;
        }
        .flight-level-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .height-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
            color: #6b7280;
        }
        .height-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .height-legend .swatch {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
        
        .btn-secondary {
            background: #6b7280;
        }
        
        pre {
            background: #0b1021;
            color: #d1d5db;
            padding: 12px;
            border-radius: 8px;
            max-height: 220px;
            overflow: auto;
        }
        
    </style>
</head>

<body>
    <div id="map"></div>
    
    <div class="sidebar">
        <h2 style="margin:0 0 12px">Карта города</h2>
        <div style="display:flex; flex-direction:column; gap:12px">
            <label style="display:flex; flex-direction:column; gap:4px">
                Город
                <input 
                    id="cityInput" 
                    list="cityList"
                    placeholder="Начните вводить название..." 
                    style="width:100%"
                    autocomplete="off"
                />
                <datalist id="cityList"></datalist>
            </label>
        </div>
        <div class="modal-footer" style="margin-top:12px">
            <div style="font-size:14px">
                <div id="status"></div>
                <div id="statsInfo" style="margin-top:4px; color:#6b7280; font-size:12px"></div>
            </div>
            <div>
                <button class="floating-btn" style="position:static" onclick="loadCityMap()">Загрузить</button>
            </div>
        </div>
        <div class="flight-levels-panel" style="margin-top:12px">
            <h3 style="margin:0 0 8px">Высота зданий</h3>
            <div class="height-legend">
                <span><span class="swatch" style="background:#22c55e"></span> &lt;15 м</span>
                <span><span class="swatch" style="background:#eab308"></span> 15–30 м</span>
                <span><span class="swatch" style="background:#f97316"></span> 30–50 м</span>
                <span><span class="swatch" style="background:#ef4444"></span> &gt;50 м</span>
            </div>
        </div>
        <div id="flightLevelsPanel" class="flight-levels-panel" style="display:none; margin-top:12px">
            <h3>Эшелоны полётов</h3>
            <div id="flightLevelsList"></div>
        </div>
        <div class="flight-levels-panel" style="margin-top:12px; border-top:1px solid #e5e7eb; padding-top:12px">
            <h3 style="margin:0 0 8px">Станции (зарядка, гаражи, ТО)</h3>
            <p style="font-size:12px; color:#6b7280; margin:0 0 8px">
                R_charge = 1.6 км, R_garage/TO = 3.2 км (×1/4 от базовых)
            </p>
            <button class="floating-btn" style="width:100%" onclick="loadStationsPlacement()">Разместить станции</button>
            <div id="stationsMetrics" style="margin-top:8px; font-size:12px; color:#374151; display:none"></div>
        </div>
    </div>

    <script>
        let map, boundaryLayer, noFlyZonesLayer, buildingsLayer;
        let demandLayer, chargeStationsLayer, garagesLayer, toStationsLayer, trunkEdgesLayer;
        let chargeRadiusLayer, garageRadiusLayer, toRadiusLayer;
        
        // Список популярных городов
        const CITIES = [
            { name: 'Волгоград', query: 'Volgograd, Russia' },
            { name: 'Балаково', query: 'Balakovo, Russia' },
        ];

        function ensureMap(center = [55.751244, 37.618423]) {
            if (!map) {
                map = L.map('map').setView(center, 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);
            }
        }
        
        function initCityAutocomplete() {
            const datalist = document.getElementById('cityList');
            const input = document.getElementById('cityInput');
            
            // Заполняем datalist городами
            CITIES.forEach(city => {
                const option = document.createElement('option');
                option.value = city.name;
                option.setAttribute('data-query', city.query);
                datalist.appendChild(option);
            });
            
            // Обработка выбора города
            input.addEventListener('input', function() {
                const selectedCity = CITIES.find(c => c.name === this.value);
                if (selectedCity) {
                    this.setAttribute('data-query', selectedCity.query);
                }
            });
        }
        
        function getCityQuery() {
            const input = document.getElementById('cityInput');
            const value = input.value.trim();
            if (!value) return null;
            const selectedCity = CITIES.find(c => c.name === value);
            if (selectedCity) return selectedCity.query;
            return value;
        }

        /** Цвет здания по высоте: низкие — зелёный, высокие — красный */
        function getBuildingColorByHeight(heightM) {
            const h = parseFloat(heightM) || 10;
            if (h < 15) return '#22c55e';   // зелёный
            if (h < 30) return '#eab308';   // жёлтый
            if (h < 50) return '#f97316';   // оранжевый
            return '#ef4444';               // красный
        }

        /** Цвет точки эшелона на легенде (1–5) */
        function getFlightLevelColor(level) {
            const colors = ['#22c55e', '#ef4444', '#f97316', '#3b82f6', '#10b981'];
            return colors[(level - 1) % colors.length] || '#6b7280';
        }

        function updateFlightLevelsPanel(flightLevels, multilevelPlanning, graphType) {
            const panel = document.getElementById('flightLevelsPanel');
            const list = document.getElementById('flightLevelsList');
            if (!panel || !list) return;
            if (!flightLevels || flightLevels.length === 0) {
                panel.style.display = 'none';
                return;
            }
            list.innerHTML = flightLevels.map(fl => `
                <div class="flight-level-item">
                    <span class="flight-level-dot" style="background:${getFlightLevelColor(fl.level)}"></span>
                    <span>${fl.label || 'Эшелон ' + fl.level + ' (' + (fl.altitude_m != null ? fl.altitude_m : '') + ' м)'}</span>
                </div>
            `).join('');
            panel.style.display = 'block';
        }

        async function loadBuildingsWithHeights(city, network, simplify) {
            try {
                console.log('Загрузка зданий с высотами...');
                const exportUrl = new URL('/api/buildings/export', window.location.origin);
                exportUrl.searchParams.set('city', city);
                exportUrl.searchParams.set('network_type', network);
                exportUrl.searchParams.set('simplify', simplify);
                
                const resp = await fetch(exportUrl);
                if (!resp.ok) throw new Error('Ошибка загрузки зданий: ' + resp.status);
                
                const data = await resp.json();
                if (!data.features || data.features.length === 0) {
                    console.log('Нет зданий для отображения');
                    return;
                }
                updateFlightLevelsPanel(data.flight_levels || [], false, null);
                const geojson = { type: 'FeatureCollection', features: data.features };
                const layerOptions = {
                    style: function(feature) {
                        const h = feature.properties?.height_m || 10;
                        const color = getBuildingColorByHeight(h);
                        return {
                            fillColor: color,
                            color: color,
                            weight: 1,
                            opacity: 0.85,
                            fillOpacity: 0.5
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        const p = feature.properties || {};
                        const h = p.height_m || '—';
                        const fl = p.flight_level || '—';
                        layer.bindPopup(`
                            <strong>Высота:</strong> ${h} м<br>
                            <strong>Рекомендуемый эшелон:</strong> ${fl}
                        `);
                    }
                };
                
                buildingsLayer = L.geoJSON(geojson, layerOptions);
                buildingsLayer.addTo(map);
                console.log('✓ Здания по высоте: ' + data.features.length);
            } catch (error) {
                console.error('Ошибка загрузки зданий с высотами:', error);
                throw error;
            }
        }

        async function loadCityMap() {
            const city = getCityQuery();
            const network = 'drive';
            const simplify = true;
            const statusEl = document.getElementById('status');
            const statsEl = document.getElementById('statsInfo');
            if (!city) {
                alert('Выберите или введите город');
                return;
            }
            statusEl.textContent = 'Загрузка данных города...';
            statsEl.textContent = '';
            try {
                const cityUrl = new URL('/api/city', window.location.origin);
                cityUrl.searchParams.set('city', city);
                cityUrl.searchParams.set('network_type', network);
                cityUrl.searchParams.set('simplify', simplify);
                const cityResp = await fetch(cityUrl);
                if (!cityResp.ok) {
                    const err = await cityResp.json().catch(() => ({}));
                    throw new Error(err.detail || 'Ошибка загрузки города');
                }
                statusEl.textContent = 'Загрузка границ и зданий...';
                const mapUrl = new URL('/api/city/map', window.location.origin);
                mapUrl.searchParams.set('city', city);
                mapUrl.searchParams.set('network_type', network);
                mapUrl.searchParams.set('simplify', simplify);
                const mapResp = await fetch(mapUrl);
                if (!mapResp.ok) {
                    const err = await mapResp.json().catch(() => ({}));
                    throw new Error(err.detail || 'Ошибка загрузки карты');
                }
                const mapData = await mapResp.json();
                ensureMap([mapData.center.lat, mapData.center.lon]);
                if (boundaryLayer) {
                    map.removeLayer(boundaryLayer);
                    boundaryLayer = null;
                }
                if (noFlyZonesLayer) {
                    map.removeLayer(noFlyZonesLayer);
                    noFlyZonesLayer = null;
                }
                if (buildingsLayer) {
                    map.removeLayer(buildingsLayer);
                    buildingsLayer = null;
                }
                removeStationLayers();
                if (mapData.no_fly_zones) {
                    noFlyZonesLayer = L.geoJSON(mapData.no_fly_zones, {
                        style: {
                            color: '#dc2626',
                            weight: 2,
                            opacity: 0.9,
                            fillColor: '#dc2626',
                            fillOpacity: 0.3,
                            dashArray: '5, 5'
                        },
                        onEachFeature: function(feature, layer) {
                            layer.bindPopup('Беспилотная зона<br>Полет запрещен');
                        }
                    }).addTo(map);
                }
                if (mapData.city_boundary) {
                    boundaryLayer = L.geoJSON(mapData.city_boundary, {
                        style: {
                            color: '#ef4444',
                            weight: 3,
                            opacity: 0.8,
                            fillColor: '#fee2e2',
                            fillOpacity: 0.1,
                            dashArray: '10, 5'
                        }
                    }).addTo(map);
                }
                await loadBuildingsWithHeights(city, network, simplify);
                const bbox = mapData.bbox;
                if (bbox && bbox.length >= 4) {
                    const [minLon, minLat, maxLon, maxLat] = bbox;
                    map.fitBounds(L.latLngBounds([[minLat, minLon], [maxLat, maxLon]]), { padding: [20, 20] });
                }
                statusEl.textContent = '✓ Готово';
                const n = (buildingsLayer && buildingsLayer.getLayers) ? buildingsLayer.getLayers().length : 0;
                statsEl.textContent = n ? `Зданий: ${n}` : 'Границы города и здания загружены';
            } catch (e) {
                console.error(e);
                statusEl.textContent = '✗ Ошибка: ' + e.message;
                statsEl.textContent = '';
            }
        }

        function removeStationLayers() {
            for (const l of [demandLayer, chargeStationsLayer, garagesLayer, toStationsLayer, trunkEdgesLayer,
                chargeRadiusLayer, garageRadiusLayer, toRadiusLayer]) {
                if (l && map.hasLayer && map.hasLayer(l)) map.removeLayer(l);
            }
            demandLayer = chargeStationsLayer = garagesLayer = toStationsLayer = trunkEdgesLayer = null;
            chargeRadiusLayer = garageRadiusLayer = toRadiusLayer = null;
            const m = document.getElementById('stationsMetrics');
            if (m) { m.style.display = 'none'; m.innerHTML = ''; }
        }

        async function loadStationsPlacement() {
            const city = getCityQuery();
            if (!city) {
                alert('Сначала выберите город и нажмите «Загрузить»');
                return;
            }
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Расчёт размещения станций...';
            removeStationLayers();
            try {
                const url = new URL('/api/stations/placement', window.location.origin);
                url.searchParams.set('city', city);
                url.searchParams.set('network_type', 'drive');
                url.searchParams.set('simplify', 'true');
                url.searchParams.set('demand_cell_m', '250');
                url.searchParams.set('num_garages', '3');
                url.searchParams.set('num_to', '2');
                const resp = await fetch(url);
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.error || err.detail || 'Ошибка API');
                }
                const data = await resp.json();
                if (data.error) {
                    throw new Error(data.error);
                }
                ensureMap();
                const opts = { pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 6, fillOpacity: 0.9 }) };
                const R_CHARGE_M = 1600;   // 1.6 км (в 4 раза меньше базового 6.4 км)
                const R_GARAGE_TO_M = 3200; // 3.2 км (в 4 раза меньше базового 12.8 км)

                if (data.demand && data.demand.features && data.demand.features.length) {
                    demandLayer = L.geoJSON(data.demand, {
                        style: { color: '#94a3b8', fillColor: '#94a3b8', weight: 1, radius: 4 },
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 4, fillColor: '#94a3b8', color: '#64748b', weight: 1, fillOpacity: 0.7 }),
                        onEachFeature: (f, layer) => { if (f.properties && f.properties.weight) layer.bindPopup('Спрос: ' + f.properties.weight); }
                    }).addTo(map);
                }
                if (data.charge_stations && data.charge_stations.features && data.charge_stations.features.length) {
                    chargeRadiusLayer = L.layerGroup();
                    data.charge_stations.features.forEach(f => {
                        const coords = f.geometry && f.geometry.coordinates;
                        if (coords && coords.length >= 2) {
                            L.circle([coords[1], coords[0]], {
                                radius: R_CHARGE_M,
                                color: '#16a34a',
                                weight: 1,
                                fillColor: '#22c55e',
                                fillOpacity: 0.12
                            }).addTo(chargeRadiusLayer);
                        }
                    });
                    chargeRadiusLayer.addTo(map);
                    chargeStationsLayer = L.geoJSON(data.charge_stations, {
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 10, fillColor: '#22c55e', color: '#16a34a', weight: 2, fillOpacity: 0.9 }),
                        onEachFeature: (f, layer) => layer.bindPopup('Зарядка + ожидание<br>R = 1.6 км')
                    }).addTo(map);
                }
                if (data.garages && data.garages.features && data.garages.features.length) {
                    garageRadiusLayer = L.layerGroup();
                    data.garages.features.forEach(f => {
                        const coords = f.geometry && f.geometry.coordinates;
                        if (coords && coords.length >= 2) {
                            L.circle([coords[1], coords[0]], {
                                radius: R_GARAGE_TO_M,
                                color: '#2563eb',
                                weight: 1,
                                fillColor: '#3b82f6',
                                fillOpacity: 0.08
                            }).addTo(garageRadiusLayer);
                        }
                    });
                    garageRadiusLayer.addTo(map);
                    garagesLayer = L.geoJSON(data.garages, {
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 10, fillColor: '#3b82f6', color: '#2563eb', weight: 2, fillOpacity: 0.9 }),
                        onEachFeature: (f, layer) => layer.bindPopup('Гараж<br>R = 3.2 км')
                    }).addTo(map);
                }
                if (data.to_stations && data.to_stations.features && data.to_stations.features.length) {
                    toRadiusLayer = L.layerGroup();
                    data.to_stations.features.forEach(f => {
                        const coords = f.geometry && f.geometry.coordinates;
                        if (coords && coords.length >= 2) {
                            L.circle([coords[1], coords[0]], {
                                radius: R_GARAGE_TO_M,
                                color: '#d97706',
                                weight: 1,
                                fillColor: '#f59e0b',
                                fillOpacity: 0.08
                            }).addTo(toRadiusLayer);
                        }
                    });
                    toRadiusLayer.addTo(map);
                    toStationsLayer = L.geoJSON(data.to_stations, {
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 10, fillColor: '#f59e0b', color: '#d97706', weight: 2, fillOpacity: 0.9 }),
                        onEachFeature: (f, layer) => layer.bindPopup('Станция ТО<br>R = 12.8 км')
                    }).addTo(map);
                }
                if (data.trunk_edges && data.trunk_edges.features && data.trunk_edges.features.length) {
                    trunkEdgesLayer = L.geoJSON(data.trunk_edges, {
                        style: { color: '#6366f1', weight: 3, opacity: 0.8 }
                    }).addTo(map);
                }
                const m = document.getElementById('stationsMetrics');
                if (m && data.metrics) {
                    const charge = data.metrics.charge || {};
                    m.innerHTML = [
                        'Покрытие спроса: ' + (data.metrics.coverage_ratio != null ? (data.metrics.coverage_ratio * 100).toFixed(1) + '%' : (charge.coverage_ratio != null ? (charge.coverage_ratio * 100).toFixed(1) + '%' : '—')),
                        'Зарядок: ' + (charge.placed != null ? charge.placed : '—'),
                        'Связность магистрали: ' + (data.metrics.trunk_connected ? 'да' : 'нет')
                    ].join('<br>');
                    m.style.display = 'block';
                }
                statusEl.textContent = '✓ Станции размещены';
            } catch (e) {
                console.error(e);
                document.getElementById('status').textContent = '✗ Ошибка: ' + e.message;
            }
        }

        // Инициализация
        ensureMap();
        initCityAutocomplete();
    </script>
</body>

</html>
